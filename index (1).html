<style>
  :root {

    --surface: #181c27;
    --surface2: #1f2435;
    --border: #2a3045;
    --border2: #3a4260;
    --accent: #4ade80;
    --accent2: #22c55e;
    --text: #e8eaf2;
    --muted: #7a84a0;
    --danger: #f87171;
    --warn: #fbbf24;
    --info: #60a5fa;
    --purple: #a78bfa;
    --radius: 10px;
    --font: 'Noto Sans KR', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }

  .shell { display: flex; min-height: 100vh; }
  .sidebar {

  .logo {

  .nav { padding: 16px 12px 0; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--muted);
    transition: all 0.15s; margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(74,222,128,0.1); color: var(--accent); }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
  .nav-badge {

    border-radius: 10px; padding: 1px 7px; font-size: 11px; font-family: var(--mono);
  }
  .nav-item.active .nav-badge { background: rgba(74,222,128,0.15); border-color: rgba(74,222,128,0.3); color: var(--accent); }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .page-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .page-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .btn {
    padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: none; font-family: var(--font); transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #0a1a0a; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(248,113,113,0.25); }
  .btn-danger:hover { background: rgba(248,113,113,0.08); }
  .btn-edit { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-edit:hover { color: var(--text); border-color: var(--border2); }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; margin-bottom: 24px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; transition: border-color 0.2s; }
  .metric-card:hover { border-color: var(--border2); }
  .metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .metric-val { font-size: 26px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; }
  .metric-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .m-green .metric-val { color: var(--accent); }
  .m-green { border-color: rgba(74,222,128,0.2); }
  .m-warn .metric-val { color: var(--warn); }
  .m-warn { border-color: rgba(251,191,36,0.2); }
  .m-info .metric-val { color: var(--info); }
  .m-info { border-color: rgba(96,165,250,0.2); }

    border-radius: var(--radius); padding: 11px 14px; margin-bottom: 18px;
    font-size: 12px; color: var(--warn); line-height: 1.5;

  .modal {

  {id:20, name:'유동 자연재해위험개선지구 정비사업 기본 및 실시설계용역', client:'함안군', annoDate:'2026-03-03', deadline:'2026-03-13', openDate:'3월 중', rank:'', totalAmt:906000000, pct:7.14, myAmt:64688400, partners:'한맥:XX:바론:XX', result:'진행중', winner:'', note:''},
  {id:21, name:'국수 공공하수처리시설 증설사업 기본 및 실시설계 용역', client:'양평군환경사업소', annoDate:'2026-02-24', deadline:'2026-03-10', openDate:'3월 중', rank:'', totalAmt:991100000, pct:0.60, myAmt:5946600, partners:'삼안:한맥:바론=70:30:측량', result:'진행중', winner:'', note:''},
  {id:22, name:'세종 스마트 국가산단 진입도로 건설공사 기본 및 실시설계용역', client:'세종특별자치시', annoDate:'2026-03-10', deadline:'2026-03-25', openDate:'미정', rank:'', totalAmt:1500000000, pct:6.99, myAmt:104850000, partners:'한맥:86.18:바론:6.99:XX지질6.83', result:'진행중', winner:'', note:'3/11연락옴'},
];

// localStorage에서 불러오기 (없으면 기본 데이터 사용)
let bids;
try {
  const saved = localStorage.getItem('bids_data');
  const savedId = localStorage.getItem('bids_nextId');
  if (saved) {
    bids = JSON.parse(saved);
    if (savedId) nextId = parseInt(savedId);
  } else {
    bids = defaultBids.map(b => ({...b}));
  }
} catch(e) {
  bids = defaultBids.map(b => ({...b}));
}

const fmtAmt = n => {
  if (!n) return '-';
  if (n >= 100000000) return (n/100000000).toFixed(2)+'억';
  return (n/10000).toLocaleString()+'만';
};

function getResult(b) { return b.result || '진행중'; }

function updateNavBadges() {
  document.getElementById('nb-all').textContent = bids.length;
  document.getElementById('nb-active').textContent = bids.filter(b=>getResult(b)==='진행중').length;
  document.getElementById('nb-lost').textContent = bids.filter(b=>getResult(b)==='타사낙찰').length;
  document.getElementById('nb-skip').textContent = bids.filter(b=>getResult(b)==='불참').length;
}

function renderMetrics() {
  const total = bids.length;
  const active = bids.filter(b=>getResult(b)==='진행중');
  const lost = bids.filter(b=>getResult(b)==='타사낙찰').length;
  const skip = bids.filter(b=>getResult(b)==='불참').length;
  const totalMyAmt = active.reduce((s,b)=>s+b.myAmt,0);
  const totalBudget = active.reduce((s,b)=>s+b.totalAmt,0);

  document.getElementById('metrics').innerHTML = `
    <div class="metric-card"><div class="metric-label">전체</div><div class="metric-val">${total}</div><div class="metric-sub">건</div></div>
    <div class="metric-card m-warn"><div class="metric-label">진행중</div><div class="metric-val">${active.length}</div><div class="metric-sub">개찰 대기</div></div>
    <div class="metric-card"><div class="metric-label">타사낙찰</div><div class="metric-val">${lost}</div><div class="metric-sub">건</div></div>
    <div class="metric-card"><div class="metric-label">불참</div><div class="metric-val">${skip}</div><div class="metric-sub">건</div></div>
    <div class="metric-card m-info"><div class="metric-label">진행중 바론 지분 합계</div><div class="metric-val">${(totalMyAmt/100000000).toFixed(1)}</div><div class="metric-sub">억원</div></div>
    <div class="metric-card m-green"><div class="metric-label">진행중 총사업금액</div><div class="metric-val">${(totalBudget/100000000).toFixed(0)}</div><div class="metric-sub">억원</div></div>
  `;
}

function renderAlerts() {
  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = bids.filter(b => {
    if (getResult(b) !== '진행중') return false;
    if (!b.deadline || b.deadline === '-') return false;
    const d = new Date(b.deadline); d.setHours(0,0,0,0);
    const diff = Math.round((d-today)/86400000);
    return diff >= 0 && diff <= 5;
  });
  const el = document.getElementById('alert-area');
  if (!upcoming.length) { el.innerHTML=''; return; }
  const items = upcoming.map(b => {
    const d = new Date(b.deadline); d.setHours(0,0,0,0);
    const diff = Math.round((d-today)/86400000);
    const short = b.name.length > 18 ? b.name.slice(0,18)+'…' : b.name;
    return `<strong>${short}</strong>&nbsp;(${diff===0?'D-DAY':'D-'+diff})`;
  }).join('&nbsp;&nbsp;·&nbsp;&nbsp;');
  el.innerHTML=`<div class="alert"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>마감 임박 (D-5 이내) — ${items}</span></div>`;
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.nav-item').forEach((el,i)=>el.classList.toggle('active',['all','active','lost','skip'][i]===v));
  const titles = {all:'입찰 참여 현황', active:'진행중 입찰', lost:'타사낙찰 내역', skip:'불참 내역'};
  document.getElementById('page-title').textContent = titles[v];
  render();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const fr = document.getElementById('f-result').value;
  const sort = document.getElementById('f-sort').value;

  let data = bids.filter(b => {
    const r = getResult(b);
    if (currentView==='active' && r!=='진행중') return false;
    if (currentView==='lost' && r!=='타사낙찰') return false;
    if (currentView==='skip' && r!=='불참') return false;
    if (fr && r!==fr) return false;
    if (q && !b.name.toLowerCase().includes(q) && !b.client.toLowerCase().includes(q) && !(b.partners||'').toLowerCase().includes(q)) return false;
    return true;
  });

  const toDate = s => { const d=new Date(s); return isNaN(d)?new Date('9999-12-31'):d; };
  if (sort==='deadline') data.sort((a,b)=>toDate(a.deadline)-toDate(b.deadline));
  else if (sort==='amount') data.sort((a,b)=>b.totalAmt-a.totalAmt);
  else if (sort==='pct') data.sort((a,b)=>b.pct-a.pct);
  else data.sort((a,b)=>b.id-a.id);
  return data;
}

function ddayClass(ds, result) {
  if (result !== '진행중' || !ds || ds==='-') return '';
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(ds); d.setHours(0,0,0,0);
  const diff=Math.round((d-today)/86400000);
  if (diff<0) return '';
  if (diff<=2) return 'date-urgent';
  if (diff<=5) return 'date-warn';
  return '';
}

function render() {
  renderMetrics(); renderAlerts(); updateNavBadges();
  const data = getFiltered();
  document.getElementById('page-subtitle').textContent = `총 ${data.length}건`;

  const tbody = document.getElementById('tbody');
  if (!data.length) { tbody.innerHTML=`<tr><td colspan="14"><div class="empty">조건에 맞는 항목이 없습니다.</div></td></tr>`; return; }

  tbody.innerHTML = data.map(b => {
    const r = getResult(b);
    const dlCls = ddayClass(b.deadline, r);
    return `<tr>
      <td><div class="td-name">${b.name}</div></td>
      <td class="td-client">${b.client}</td>
      <td class="date-cell">${b.annoDate||'-'}</td>
      <td class="date-cell ${dlCls}">${b.deadline||'-'}</td>
      <td class="date-cell">${b.openDate||'-'}</td>
      <td class="td-rank">${b.rank||'-'}</td>
      <td class="td-amt">${fmtAmt(b.totalAmt)}</td>
      <td class="td-pct">${b.pct?b.pct.toFixed(2)+'%':'-'}</td>
      <td class="td-amt" style="color:var(--accent)">${fmtAmt(b.myAmt)}</td>
      <td class="td-partner">${b.partners||'-'}</td>
      <td><span class="badge badge-${r}">${r}</span></td>
      <td style="font-size:11px;color:${b.winner&&b.winner!=='-'?'var(--warn)':'var(--muted)'}">${b.winner||'-'}</td>
      <td class="td-note">${b.note||'-'}</td>
      <td><div class="row-acts">
        <button class="btn btn-sm btn-edit" onclick="editBid(${b.id})">수정</button>
        <button class="btn btn-sm btn-danger" onclick="deleteBid(${b.id})">삭제</button>
      </div></td>
    </tr>`;
  }).join('');
}

function openModal(bid=null) {
  const isEdit=!!bid;
  const b=bid||{id:null,name:'',client:'',annoDate:'',deadline:'',openDate:'',rank:'',totalAmt:'',pct:'',myAmt:'',partners:'',result:'진행중',winner:'',note:''};
  document.getElementById('modal-root').innerHTML=`
  <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-title">${isEdit?'입찰 수정':'새 입찰 등록'}</div>
      <div class="form-grid">
        <div class="field full"><label>용역명 *</label><input id="f-name" value="${b.name}" placeholder="용역명을 입력하세요"></div>
        <div class="field"><label>발주처 *</label><input id="f-client" value="${b.client}" placeholder="발주처명"></div>
        <div class="field"><label>공고일</label><input id="f-anno" type="date" value="${b.annoDate||''}"></div>
        <div class="field"><label>등록 마감일</label><input id="f-deadline" type="date" value="${b.deadline||''}"></div>
        <div class="field"><label>개찰일시</label><input id="f-open" value="${b.openDate||''}" placeholder="예: 2026-03-20(11시)"></div>
        <div class="field"><label>개찰 순위</label><input id="f-rank" value="${b.rank||''}" placeholder="예: 5위"></div>
        <div class="field"><label>총 사업금액 (원)</label><input id="f-total" type="number" value="${b.totalAmt||''}" placeholder="예: 1000000000"></div>
        <div class="field"><label>바론 지분율 (%)</label><input id="f-pct" type="number" step="0.01" value="${b.pct||''}" placeholder="예: 12.5"></div>
        <div class="field"><label>바론 지분금액 (원)</label><input id="f-myamt" type="number" value="${b.myAmt||''}" placeholder="지분율 입력시 자동계산"></div>
        <div class="field"><label>결과</label><select id="f-result-modal">
          ${['진행중','타사낙찰','낙찰','불참'].map(s=>`<option${b.result===s?' selected':''}>${s}</option>`).join('')}
        </select></div>
        <div class="field full"><label>참여사 구성</label><input id="f-partners" value="${b.partners||''}" placeholder="예: 삼안:한맥:바론=70:30:측량"></div>
        <div class="field"><label>낙찰사</label><input id="f-winner" value="${b.winner||''}" placeholder="타사낙찰시 입력"></div>
        <div class="field"><label>비고</label><input id="f-note" value="${b.note||''}" placeholder="메모"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="saveBid(${b.id||'null'})">${isEdit?'저장':'추가'}</button>
      </div>
    </div>
  </div>`;
  ['f-total','f-pct'].forEach(id=>{
    document.getElementById(id).addEventListener('input',()=>{
      const t=parseFloat(document.getElementById('f-total').value)||0;
      const p=parseFloat(document.getElementById('f-pct').value)||0;
      if(t&&p) document.getElementById('f-myamt').value=Math.round(t*p/100);
    });
  });
}

function closeModal() { document.getElementById('modal-root').innerHTML=''; }

function saveBids() {
  try { localStorage.setItem('bids_data', JSON.stringify(bids)); localStorage.setItem('bids_nextId', String(nextId)); } catch(e) {}
}

function saveBid(id) {
  const name=document.getElementById('f-name').value.trim();
  const client=document.getElementById('f-client').value.trim();
  if(!name||!client){alert('용역명과 발주처는 필수입니다.');return;}
  const obj={name,client,
    annoDate:document.getElementById('f-anno').value,
    deadline:document.getElementById('f-deadline').value,
    openDate:document.getElementById('f-open').value.trim(),
    rank:document.getElementById('f-rank').value.trim(),
    totalAmt:parseInt(document.getElementById('f-total').value)||0,
    pct:parseFloat(document.getElementById('f-pct').value)||0,
    myAmt:parseInt(document.getElementById('f-myamt').value)||0,
    partners:document.getElementById('f-partners').value.trim(),
    result:document.getElementById('f-result-modal').value,
    winner:document.getElementById('f-winner').value.trim(),
    note:document.getElementById('f-note').value.trim(),
  };
  if(id !== null && id !== undefined){
    const numId = Number(id);
    const i=bids.findIndex(b=>Number(b.id)===numId);
    if(i===-1){alert('수정할 항목을 찾을 수 없습니다.');return;}
    bids[i]={...bids[i],...obj};
    toast('수정되었습니다.');
  } else {
    bids.push({id:nextId++,...obj});
    toast('추가되었습니다.');
  }
  saveBids(); closeModal(); render();
}

function editBid(id){openModal(bids.find(b=>Number(b.id)===Number(id)));}

function deleteBid(id){
  if(!confirm('삭제하시겠습니까?'))return;
  bids=bids.filter(b=>Number(b.id)!==Number(id));
  saveBids(); toast('삭제되었습니다.'); render();
}

function exportCSV(){
  const headers=['용역명','발주처','공고일','마감일','개찰일시','순위','총사업금액','바론지분율','바론지분금액','참여사','결과','낙찰사','비고'];
  const rows=bids.map(b=>[b.name,b.client,b.annoDate,b.deadline,b.openDate,b.rank,b.totalAmt,b.pct+'%',b.myAmt,b.partners,b.result,b.winner,b.note].map(v=>`"${String(v||'').replace(/"/g,'""')}"`));
  const csv='\uFEFF'+[headers,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='입찰관리_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); toast('CSV 다운로드 완료');
}

let toastTimer;
function toast(msg){
  clearTimeout(toastTimer);
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=document.createElement('div');
  el.className='toast';
  el.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>${msg}`;
  document.body.appendChild(el);
  toastTimer=setTimeout(()=>el.remove(),2500);
}

render();
</script>
